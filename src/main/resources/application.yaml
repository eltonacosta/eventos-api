spring:
  application:
    name: eventos-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/eventos}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    url: ${DB_URL:jdbc:postgresql://localhost:5432/eventos}
    user: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    locations: classpath:db/migration
    schemas: ${FLYWAY_SCHEMAS:public}
    default-schema: ${FLYWAY_DEFAULT_SCHEMA:public}
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:false}
    validate-on-migrate: ${FLYWAY_VALIDATE_ON_MIGRATE:true}
    out-of-order: ${FLYWAY_OUT_OF_ORDER:false}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: ${JPA_SHOW_SQL:false}

server:
  port: ${SERVER_PORT:8080}
